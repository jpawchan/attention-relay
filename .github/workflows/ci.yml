name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: |
          python3 -m py_compile framework/baton tests/test_baton.py tools/measure_context.py tests/test_context_footprint.py
          python3 tests/test_baton.py
          python3 tests/test_context_footprint.py
          python3 tools/measure_context.py --json > context-1.json
          python3 tools/measure_context.py --json > context-2.json
          cmp context-1.json context-2.json
