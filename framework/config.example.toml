# Baton project-local worker configuration
#
# A fresh install intentionally has no worker routes. The orchestrator will ask
# once for hard, medium, and easy settings, then write only this Git-ignored
# project's .baton/config.toml after an explicit choice or the documented derive
# path.

[commands]
# Optional shared command inherited by an explicitly configured tier. The
# placeholder must be one complete argument. Baton parses argv without a shell.
# worker = "agent-cli run {prompt_file}"

# Every usable task category needs an explicit table. A tier can provide its own
# command or inherit commands.worker. Commands and wrappers must actually select
# the model and reasoning described by display metadata; metadata alone never
# changes routing.
#
# [tiers.category]
# command = "agent-cli run {prompt_file}"
# worker_timeout_minutes = 30
# capsule_max_chars = 3000
#
# [tiers.category.display]
# model = "<selected model>"
# harness = "<local CLI>"
# effort = "<selected reasoning level>"
# engineering_role = "<optional role>"
# fallback = "<optional executable fallback behavior>"

[limits]
max_parallel = 3
# Maximum generated Critical Context Capsule size; over-budget tasks do not run.
capsule_max_chars = 4000
# Minutes; 0 disables the timeout.
worker_timeout_minutes = 60

[gates]
# Optionally require edit -> verify -> report phase-brief order. Receipts are
# recorded regardless; the sequence gate is off by default.
phase_sequence_requires_briefs = false
# Require a fresh report-phase brief token before a worker can finish.
finish_requires_brief = true
# Require needs_review reports to use the exact worker.md section structure.
report_requires_sections = true
# Require a fresh review-phase brief token before an orchestrator can accept.
accept_requires_brief = true
